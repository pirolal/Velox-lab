<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox Lab</title>
    <link rel="stylesheet" href="/frontend/style.css" />
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/frontend/index.html" aria-label="Velox Lab home">
            <img src="/frontend/logo-veloxlab.svg" alt="Velox Lab logo" />
        </a>
        <nav class="top-nav">
            <a href="/frontend/admin.html">Admin</a>
        </nav>
    </header>

    <main class="container">
        <div class="main-layout-split">
            <section class="hero">
                <div class="hero-content">
                    <h1>Velox Lab</h1>
                    <p class="hero-description">
                        Velox Lab: Non perdere la scia. Strada, Pista, MTB. Solo i fatti, i dati e le storie che muovono il ciclismo moderno. Alla velocità di uno scatto.
                    </p>
                </div>
            </section>

            <div class="countdown-banner" id="main-countdown">
                <h3 id="next-race-name-header">PROSSIMA GARA</h3>
            
                <div id="timer-display-new">
                    <div class="time-box-new"><span id="days">00</span><p>G</p></div>
                    <div class="time-box-new"><span id="hours">00</span><p>O</p></div>
                    <div class="time-box-new"><span id="minutes">00</span><p>M</p></div>
                    <div class="time-box-new"><span id="seconds">00</span><p>S</p></div>
                </div>

                <div class="countdown-footer">
                    <a href="#sezione-gare" class="btn-scopri-rettangolo">SCOPRI DI PIÙ</a>
                </div>
            </div>
        </div>

        <section class="news-section">
            <div class="section-head">
                <h2>Ultime Notizie</h2>
            </div>
            <div class="filter-container">
                <button class="filter-btn active" onclick="filterNews('Tutte')">Tutte</button>
                <button class="filter-btn" onclick="filterNews('World Tour')">World Tour</button>
                <button class="filter-btn" onclick="filterNews('Professionismo')">Professionismo</button>
                <button class="filter-btn" onclick="filterNews('Donne Elite')">Donne Elite</button>
                <button class="filter-btn" onclick="filterNews('Ciclocross')">Ciclocross</button>
                <button class="filter-btn" onclick="filterNews('Nazionale')">Nazionale</button>
            </div>
            <div id="news-grid" class="grid"></div>
        </section>

        <section class="gare-section" id="sezione-gare">
            <div class="section-head">
                <h2>Gare in Programma</h2>
            </div>
            <div id="gare-list" class="gare-list"></div>
        </section>
    </main>

    <script>
        let allNews = [];

        function renderNews(items) {
            const container = document.getElementById('news-grid');
            if (!container) return;
            
            const cards = items.map(n => `
                <article class="card clickable" onclick="location.href='/frontend/detail.html?id=${n.id}'">
                    <img src="${n.immagine_url}" alt="${n.titolo}" />
                    <div class="card-body">
                        <p class="chip">${n.categoria}</p>
                        <h3>${n.titolo}</h3>
                        <p>${n.sottotitolo || ''}</p>
                    </div>
                </article>
            `).join('');
            container.innerHTML = cards || '<p>Nessuna notizia disponibile.</p>';
        } 

        function filterNews(categoria) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === categoria) btn.classList.add('active');
            });

            if (categoria === 'Tutte') {
                renderNews(allNews);
            } else {
                const filtrate = allNews.filter(n => n.categoria === categoria);
                renderNews(filtrate);
            }
        }

        async function loadHomeFeed() {
            try {
                const [newsRes, gareRes] = await Promise.all([
                    fetch('/api/news?offset=0'),
                    fetch('/api/gare?future_only=true')
                ]);

                if (!newsRes.ok || !gareRes.ok) throw new Error("Errore API");

                const newsData = await newsRes.json();
                const gareData = await gareRes.json();
                allNews = newsData.items || [];
                const gareItems = gareData.items || [];

                renderNews(allNews);

                const FALLBACK = 'https://images.unsplash.com/photo-1485965120184-e220f721d03e?auto=format&fit=crop&w=400&q=60';
                const rows = gareItems.map(g => {
                    const d = new Date(g.data_gara);
                    const day = d.getDate();
                    const month = d.toLocaleDateString('it-IT', { month: 'short' }).toUpperCase();
                    const thumb = g.immagine_url || FALLBACK;
                    const badges = [
                        g.distanza_km ? `${g.distanza_km}km ` : null,
                        g.dislivello_m ? `${g.dislivello_m}m D+ ` : null,
                    ].filter(Boolean);
                    const badgesHtml = badges.map(b => `<span>${b}</span>`).join('');
                    const descriptionHtml = g.descrizione ? `<p class="gara-description">${g.descrizione}</p>` : '';
                    
                    return `
                    <article class="gara-card">
                        <div class="gara-date">
                            <span class="gara-day">${day}</span>
                            <span class="gara-month">${month}</span>
                        </div>
                        <div class="gara-info">
                            <span class="chip chip-gara">${g.categoria}</span>
                            <h3>${g.nome}</h3>
                            <p>📍 ${g.luogo}${g.orario_partenza ? ` • 🕘 ${g.orario_partenza}` : ''}</p>
                            <div class="gara-badges">${badgesHtml}</div>
                            ${descriptionHtml}
                        </div>
                        <img class="gara-thumb" src="${thumb}" alt="${g.nome}" />
                    </article>`;
                }).join('');
                
                document.getElementById('gare-list').innerHTML = rows || '<p>Nessuna gara in programma.</p>';
            } catch (err) {
                console.error(err);
                document.getElementById('news-grid').innerHTML = '<p>Errore nel caricamento notizie.</p>';
            }
        }

        loadHomeFeed();
    </script>
    <script src="/frontend/countdown.js"></script>
</body>
</html>
